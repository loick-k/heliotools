<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="930" viewBox="0 0 1500 930">

<defs>
  <marker id="arrow-orange" markerWidth="18" markerHeight="18" refX="16" refY="9" orient="auto" markerUnits="userSpaceOnUse"><path d="M2,2 L16,9 L2,16 Z" fill="#f59e0b"/></marker>
  <marker id="arrow-red" markerWidth="18" markerHeight="18" refX="16" refY="9" orient="auto" markerUnits="userSpaceOnUse"><path d="M2,2 L16,9 L2,16 Z" fill="#dc2626"/></marker>
  <marker id="arrow-green" markerWidth="18" markerHeight="18" refX="16" refY="9" orient="auto" markerUnits="userSpaceOnUse"><path d="M2,2 L16,9 L2,16 Z" fill="#16a34a"/></marker>
  <marker id="arrow-blue" markerWidth="18" markerHeight="18" refX="16" refY="9" orient="auto" markerUnits="userSpaceOnUse"><path d="M2,2 L16,9 L2,16 Z" fill="#2563eb"/></marker>
  <marker id="arrow-gray" markerWidth="18" markerHeight="18" refX="16" refY="9" orient="auto" markerUnits="userSpaceOnUse"><path d="M2,2 L16,9 L2,16 Z" fill="#64748b"/></marker>
  <style>
    .title{font:700 28px Arial,sans-serif;fill:#0f172a}
    .subtitle{font:400 16px Arial,sans-serif;fill:#475569}
    .label{font:700 17px Arial,sans-serif;fill:#0f172a}
    .small{font:400 14px Arial,sans-serif;fill:#334155}
    .tiny{font:400 12px Arial,sans-serif;fill:#475569}
    .box{fill:#fff;stroke:#cbd5e1;stroke-width:2;rx:16}
    .orange{fill:#fff7ed;stroke:#f59e0b;stroke-width:3;rx:16}
    .red{fill:#fef2f2;stroke:#dc2626;stroke-width:3;rx:16}
    .green{fill:#f0fdf4;stroke:#16a34a;stroke-width:3;rx:16}
    .blue{fill:#eff6ff;stroke:#2563eb;stroke-width:3;rx:16}
    .gray{fill:#f8fafc;stroke:#64748b;stroke-width:2.5;rx:16}
    .pipe-orange{fill:none;stroke:#f59e0b;stroke-width:7;stroke-linecap:round;marker-end:url(#arrow-orange)}
    .pipe-red{fill:none;stroke:#dc2626;stroke-width:7;stroke-linecap:round;marker-end:url(#arrow-red)}
    .pipe-green{fill:none;stroke:#16a34a;stroke-width:7;stroke-linecap:round;marker-end:url(#arrow-green)}
    .pipe-blue{fill:none;stroke:#2563eb;stroke-width:7;stroke-linecap:round;marker-end:url(#arrow-blue)}
    .pipe-gray{fill:none;stroke:#64748b;stroke-width:5;stroke-linecap:round;stroke-dasharray:10 8;marker-end:url(#arrow-gray)}
    .return{stroke-dasharray:12 10;opacity:.8}
  </style>
</defs>

<rect x="0" y="0" width="1500" height="930" fill="#ffffff"/>
<text x="60" y="62" class="title">Schémathèque HelioStock - PAC géothermique seule</text>
<text x="62" y="94" class="subtitle">Le champ de sondes alimente une PAC pour couvrir le process basse température.</text>

<rect x="980" y="38" width="440" height="98" class="gray"/>
<text x="1005" y="70" class="label">Convention</text>
<line x1="1005" y1="96" x2="1065" y2="96" stroke="#f59e0b" stroke-width="7" stroke-linecap="round"/><text x="1080" y="101" class="tiny">solaire</text>
<line x1="1005" y1="120" x2="1065" y2="120" stroke="#16a34a" stroke-width="7" stroke-linecap="round"/><text x="1080" y="125" class="tiny">stockage / sondes</text>
<line x1="1210" y1="96" x2="1270" y2="96" stroke="#dc2626" stroke-width="7" stroke-linecap="round"/><text x="1285" y="101" class="tiny">process HT</text>
<line x1="1210" y1="120" x2="1270" y2="120" stroke="#2563eb" stroke-width="7" stroke-linecap="round"/><text x="1285" y="125" class="tiny">PAC / process BT</text>

<rect x="515" y="515" width="330" height="120" class="green"/><text x="543" y="557" class="label">Échangeur injection BTES</text>
<text x="543" y="587" class="small">Surplus solaire valorisable</text>
<text x="543" y="612" class="small">limité par Tmax = 40 °C</text>
<rect x="470" y="735" width="420" height="145" class="green"/><text x="498" y="777" class="label">Champ de sondes BTES</text>
<text x="498" y="807" class="small">Stockage intersaisonnier dans le sol</text>
<text x="498" y="832" class="small">État calculé : Estock et Tchamp</text>
<text x="498" y="857" class="small">Bornes : Tmin / Tmax 40 °C</text>
<rect x="70" y="760" width="280" height="105" class="gray"/><text x="98" y="802" class="label">Échanges avec le sol</text>
<text x="98" y="832" class="small">Pertes si Tchamp &gt; Tsol</text>
<text x="98" y="857" class="small">Recharge si Tchamp &lt; Tsol</text>
<path d="M680 635 L680 735" class="pipe-green"/>
<path d="M710 735 C760 675 745 645 710 635" class="pipe-green return"/>
<path d="M350 815 L470 815" class="pipe-gray"/>
<g opacity="0.65"><line x1="520" y1="850" x2="520" y2="775" stroke="#16a34a" stroke-width="5"/><line x1="565" y1="862" x2="565" y2="765" stroke="#16a34a" stroke-width="5"/><line x1="610" y1="866" x2="610" y2="760" stroke="#16a34a" stroke-width="5"/><line x1="655" y1="866" x2="655" y2="760" stroke="#16a34a" stroke-width="5"/><line x1="700" y1="866" x2="700" y2="760" stroke="#16a34a" stroke-width="5"/><line x1="745" y1="862" x2="745" y2="765" stroke="#16a34a" stroke-width="5"/><line x1="790" y1="850" x2="790" y2="775" stroke="#16a34a" stroke-width="5"/></g>
<rect x="1010" y="720" width="250" height="125" class="blue"/><text x="1038" y="762" class="label">PAC géothermique</text>
<text x="1038" y="792" class="small">COP = f(Tchamp)</text>
<text x="1038" y="817" class="small">Évaporateur côté sondes</text>
<rect x="1290" y="720" width="185" height="125" class="blue"/><text x="1318" y="762" class="label">Batterie BT</text>
<text x="1318" y="792" class="small">Préchauffage air</text>
<text x="1318" y="817" class="small">Air extérieur → 25 °C</text>
<path d="M890 805 L1010 780" class="pipe-green"/><text x="900" y="750" class="tiny">Chaleur extraite du champ</text>
<path d="M1010 830 C955 875 900 875 855 845" class="pipe-green return"/>
<path d="M1260 782 L1290 782" class="pipe-blue"/>
<path d="M1290 830 C1215 890 1110 885 1020 845" class="pipe-blue return"/>
<rect x="1035" y="865" width="210" height="50" class="gray"/><text x="1063" y="907" class="label">Électricité PAC</text>
<path d="M1140 865 L1140 845" class="pipe-gray"/>
<rect x="1290" y="865" width="185" height="55" class="gray"/><text x="1318" y="907" class="label">Appoint BT</text>
<text x="1318" y="937" class="small">si PAC insuffisante</text>
<path d="M1382 845 L1382 865" class="pipe-gray"/>
<rect x="70" y="390" width="380" height="190" class="gray"/>
<text x="98" y="426" class="label">Logique associée au modèle</text>
<text x="98" y="458" class="small">1. Priorité au besoin direct si présent</text>
<text x="98" y="486" class="small">2. Surplus solaire vers stockage si disponible</text>
<text x="98" y="514" class="small">3. PAC BT : chaleur livrée = champ + électricité</text>
<text x="98" y="542" class="small">4. Champ : injection - extraction</text>
<text x="98" y="570" class="small">   puis pertes/recharge naturelle</text>
</svg>